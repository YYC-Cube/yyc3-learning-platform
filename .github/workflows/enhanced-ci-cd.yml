# YYC³ Learning Platform — Enhanced CI/CD Pipeline
# @version 4.0.0
# Optimized for learning.yyc3.top deployment
# Domain: learning.yyc3.top

name: Enhanced CI/CD Pipeline — YYC³ Learning Platform

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  DOMAIN_NAME: 'learning.yyc3.top'

jobs:
  # ===== Phase 1: Code Quality & Security =====
  quality-check:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: ESLint (zero warnings)
        run: pnpm exec eslint --config eslint.config.js --max-warnings 0 app/ lib/ components/

      - name: Prettier format check
        run: pnpm run format:check

      - name: Security vulnerability scan
        run: |
          pnpm audit --audit-level high --registry https://registry.npmjs.org || echo "Security issues found, check logs"
        continue-on-error: true

  # ===== Phase 2: Testing =====
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: quality-check
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        env:
          CI: true
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-key-for-testing-only-32chars
          JWT_EXPIRES_IN: 1d
          BCRYPT_ROUNDS: 4
          NEXT_PUBLIC_APP_URL: http://localhost:3200
          NEXT_PUBLIC_API_URL: http://localhost:3200/api
        run: |
          pnpm exec vitest run --coverage --shard=${{ matrix.shard }}/3

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: matrix.shard == 1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.shard == 1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ===== Phase 3: E2E Testing =====
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: true
        run: pnpm exec playwright test
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ===== Phase 4: Build & Deploy =====
  build-and-deploy:
    name: Build & Deploy to ${{ github.event.inputs.deploy_environment || 'production' }}
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch for static export
        run: |
          cat > app/providers/DynamicProviders.tsx << 'EOFILE'
          "use client"
          export { default as BottomNav } from "@/components/bottom-nav"
          export { default as AIAssistantProvider } from "@/app/providers/AIAssistantProvider"
          export { default as PerformanceMonitor } from "@/components/PerformanceMonitor"
          EOFILE
          rm -rf app/api
          rm -rf app/courses/\[id\]
          rm -rf app/exam/\[id\]
          rm -f middleware.ts
          cp next.config.js next.config.js.bak
          node scripts/patch-export.js

      - name: Build for learning.yyc3.top (static export)
        env:
          NEXT_PUBLIC_APP_URL: https://learning.yyc3.top
          NEXT_PUBLIC_API_URL: https://learning.yyc3.top/api
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'pages-build-dummy-key-at-least-32-characters-long' }}
          JWT_EXPIRES_IN: 7d
          BCRYPT_ROUNDS: 10
        run: |
          pnpm build
          mv next.config.js.bak next.config.js

      - name: Add CNAME and optimization files
        run: |
          echo "learning.yyc3.top" > out/CNAME
          touch out/.nojekyll

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  # ===== Phase 5: Post-Deployment =====
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Verify deployment
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://learning.yyc3.top)
          if [ $response -eq 200 ]; then
            echo "✅ Deployment successful - https://learning.yyc3.top is accessible"
          else
            echo "❌ Deployment verification failed - HTTP status: $response"
            exit 1
          fi

      - name: Check critical pages
        run: |
          for page in "/" "/courses" "/exam" "/profile"; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://learning.yyc3.top$page)
            if [ $response -eq 200 ]; then
              echo "✅ $page - OK"
            else
              echo "❌ $page - Failed ($response)"
            fi
          done

  # ===== Phase 6: Notifications =====
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality-check, test, e2e, build-and-deploy, post-deploy]
    if: always()
    steps:
      - name: Generate deployment summary
        run: |
          echo "## 🚀 YYC³ Learning Platform — CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.quality-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Deploy | ${{ needs.build-and-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Deploy | ${{ needs.post-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Domain**: https://learning.yyc3.top" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Deployment success notification
        if: needs.build-and-deploy.result == 'success' && needs.post-deploy.result == 'success'
        run: |
          echo "🎉 **DEPLOYMENT SUCCESSFUL**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "YYC³ Learning Platform has been successfully deployed to:" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **https://learning.yyc3.top**" >> $GITHUB_STEP_SUMMARY
