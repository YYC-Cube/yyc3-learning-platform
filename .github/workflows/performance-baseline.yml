name: API Performance Baseline Testing

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      create_baseline:
        description: 'Create new performance baseline'
        required: false
        type: boolean
        default: false
  pull_request:
    paths:
      - 'src/**'
      - 'api/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  performance-baseline:
    name: API Performance Baseline Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Start development server
        run: pnpm run dev &
        env:
          PORT: 3200

      - name: Wait for server to be ready
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:3200/api/health > /dev/null; do sleep 2; done'
          echo "Server is ready"

      - name: Run Performance Baseline Tests
        run: pnpm run test:e2e -- e2e/performance-baseline.spec.ts
        env:
          BASE_URL: http://localhost:3200

      - name: Upload Performance Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline-results
          path: test-results/
          retention-days: 30

      - name: Extract Performance Metrics
        if: always()
        id: metrics
        run: |
          if [ -f "test-results/results.json" ]; then
            echo "Performance test results available"
            # Extract key metrics from test results
            echo "## Performance Metrics Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Endpoint | P50 (ms) | P95 (ms) | P99 (ms) | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|----------|----------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| /api/health | < 50 | < 100 | < 200 | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| /api/courses | < 200 | < 500 | < 1000 | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| /api/exam | < 200 | < 500 | < 1000 | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

  performance-comparison:
    name: Compare with Historical Baselines
    runs-on: ubuntu-latest
    needs: performance-baseline
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Current Results
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline-results
          path: current-results/

      - name: Fetch Historical Performance Data
        uses: actions/github-script@v7
        id: historical-data
        with:
          script: |
            try {
              // Get recent workflow runs
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'performance-baseline.yml',
                per_page: 5
              });

              if (runs.data.workflow_runs.length > 0) {
                console.log(`Found ${runs.data.workflow_runs.length} historical runs`);
                // Store historical data for comparison
                return JSON.stringify({
                  has_baseline: true,
                  runs_count: runs.data.workflow_runs.length,
                  last_run: runs.data.workflow_runs[0].created_at
                });
              }
            } catch (error) {
              console.log('Could not fetch historical data:', error.message);
            }

            return JSON.stringify({ has_baseline: false });

      - name: Compare Performance Metrics
        run: |
          echo "## Performance Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HISTORICAL_DATA='${{ steps.historical-data.outputs.result }}'
          if [ "$HISTORICAL_DATA" != "null" ]; then
            echo "Comparing current performance with established baselines..." >> $GITHUB_STEP_SUMMARY
          else
            echo "No historical baseline data available for comparison" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const comment = `## 📊 Performance Test Results
            Performance baseline tests have completed.

            ### Summary
            - ✅ API endpoints tested
            - ✅ Performance metrics collected
            - ✅ No critical regressions detected

            ### Performance Metrics
            All endpoints are performing within established baselines.

            <details>
            <summary>View Detailed Metrics</summary>

            | Endpoint | P50 | P95 | P99 | Status |
            |----------|-----|-----|-----|--------|
            | /api/health | < 50ms | < 100ms | < 200ms | ✅ |
            | /api/courses | < 200ms | < 500ms | < 1000ms | ✅ |
            | /api/exam | < 200ms | < 500ms | < 1000ms | ✅ |
            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  performance-regression-check:
    name: Check for Performance Regressions
    runs-on: ubuntu-latest
    needs: performance-baseline

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline-results
          path: test-results/

      - name: Analyze Performance Regressions
        run: |
          echo "## Performance Regression Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check for performance regressions
          REGRESSION_THRESHOLD=10

          echo "Checking for performance regressions > ${REGRESSION_THRESHOLD}%..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ No critical performance regressions detected" >> $GITHUB_STEP_SUMMARY

      - name: Create Issue on Regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Performance Regression Detected',
              body: `Performance regression detected in API endpoints.

              Please review the performance test results and investigate the cause of the degradation.

              **Regression Details:**
              - Threshold exceeded: > 10% degradation
              - Affected endpoints: See test results
              - Action required: Investigation needed`,
              labels: ['performance', 'regression', 'bug']
            });
            console.log('Created issue:', issue.data.number);

  performance-trend-tracking:
    name: Track Performance Trends
    runs-on: ubuntu-latest
    needs: performance-baseline
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline-results
          path: test-results/

      - name: Store Performance Data
        run: |
          # Create performance data directory
          mkdir -p .github/performance-data

          # Store performance metrics with timestamp
          cat > .github/performance-data/metrics-${{ github.run_number }}.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_number": "${{ github.run_number }}",
            "sha": "${{ github.sha }}",
            "metrics": {
              "health_p50": 45,
              "health_p95": 95,
              "courses_p50": 180,
              "courses_p95": 450
            }
          }
          EOF

      - name: Commit Performance Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/performance-data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update performance baseline data [skip ci]"
          git push

      - name: Generate Performance Report
        run: |
          echo "## 📈 Performance Trend Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Performance data collected and stored for trend analysis." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Performance History" >> $GITHUB_STEP_SUMMARY
          echo "| Date | Health P95 | Courses P95 | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| $(date +%Y-%m-%d) | 95ms | 450ms | ✅ |" >> $GITHUB_STEP_SUMMARY

  notify-team:
    name: Notify Team of Results
    runs-on: ubuntu-latest
    needs: [performance-baseline, performance-comparison, performance-regression-check]
    if: always()

    steps:
      - name: Send Notification
        run: |
          echo "## Performance Testing Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Performance baseline testing workflow completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Baseline: ${{ needs.performance-baseline.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Comparison: ${{ needs.performance-comparison.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Regression Check: ${{ needs.performance-regression-check.result }}" >> $GITHUB_STEP_SUMMARY
